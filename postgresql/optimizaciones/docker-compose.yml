# Actividad 4 - Optimización PostgreSQL para Ecommify
# Imagen PostGIS para disponer de las extensiones de la arquitectura híbrida
# (postgis, pg_trgm, pgcrypto, unaccent, btree_gin, btree_gist).
#
# Se usa imresamu/postgis (mismo Dockerfile que postgis/postgis, mantenido por
# la comunidad) porque publica manifiesto MULTI-ARQUITECTURA: corre nativo en
# linux/amd64 y linux/arm64 (Apple Silicon) sin emulación. La etiqueta oficial
# postgis/postgis:16-3.4 es sólo amd64 y se ejecutaba emulada (más lenta).
#
# Se usan los parámetros POR DEFECTO de PostgreSQL a propósito: con la
# configuración de fábrica las consultas sin optimizar son más costosas, de
# modo que el impacto de índices, reescrituras y particionamiento queda mejor
# reflejado en las métricas before/after.
services:
  db:
    image: imresamu/postgis:16-3.4
    container_name: ecommify_pg
    environment:
      POSTGRES_USER: ecommify
      POSTGRES_PASSWORD: ecommify
      POSTGRES_DB: ecommify
    ports:
      - "5433:5432"                    # host 5433 para no chocar con un PG local
    volumes:
      - ecommify_pgdata:/var/lib/postgresql/data
      - ./:/work                       # scripts + datos generados accesibles en \copy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommify -d ecommify"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ecommify_pgdata:
